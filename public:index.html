<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HARDWOOD 3D — Online</title>
<script src="/socket.io/socket.io.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap');
:root{--p1:#ff3333;--p2:#3388ff;--accent:#ff7700;--gold:#ffcc00;--green:#00ffaa;--bg:#0a0a0f;--hud-bg:rgba(8,8,16,0.92);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Rajdhani',sans-serif;}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}
.scanlines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);z-index:1;}
/* TITLE */
#title{background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a0e04 0%,#08080f 70%);}
.logo-main{font-family:'Teko',sans-serif;font-size:clamp(72px,14vw,140px);font-weight:700;letter-spacing:6px;line-height:0.85;background:linear-gradient(180deg,#fff8f0 0%,#ff7700 45%,#c84400 100%);-webkit-background-clip:text;background-clip:text;color:transparent;animation:pulse 3s ease-in-out infinite alternate;position:relative;z-index:2;}
.logo-3d{font-family:'Teko',sans-serif;font-size:clamp(28px,5vw,52px);font-weight:400;color:var(--accent);letter-spacing:20px;text-shadow:0 0 20px var(--accent);position:relative;z-index:2;}
.logo-sub{font-size:13px;letter-spacing:8px;color:rgba(255,255,255,0.3);margin-top:6px;margin-bottom:40px;position:relative;z-index:2;}
@keyframes pulse{from{filter:drop-shadow(0 0 20px rgba(255,119,0,0.3));}to{filter:drop-shadow(0 0 60px rgba(255,119,0,0.8));}}
.btns{display:flex;flex-direction:column;gap:12px;align-items:center;position:relative;z-index:2;}
.btn{font-family:'Teko',sans-serif;font-size:22px;font-weight:600;letter-spacing:5px;padding:14px 56px;border:none;cursor:pointer;transition:all 0.15s;clip-path:polygon(16px 0%,100% 0%,calc(100% - 16px) 100%,0% 100%);text-transform:uppercase;}
.bp{background:var(--accent);color:#000;}.bp:hover{background:#ff9933;transform:scale(1.04);}
.bs{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.25);clip-path:none;}.bs:hover{border-color:rgba(255,255,255,0.6);}
.bsm{font-size:16px;padding:10px 32px;}
/* LOBBY */
#lobby{background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a0e04 0%,#08080f 70%);}
.lbox{position:relative;z-index:2;width:min(460px,92vw);text-align:center;}
.ltitle{font-family:'Teko',sans-serif;font-size:52px;font-weight:700;color:#fff;letter-spacing:4px;margin-bottom:4px;}
.ltitle span{color:var(--accent);}
.lsub{font-size:13px;letter-spacing:4px;color:rgba(255,255,255,0.3);margin-bottom:32px;}
.ig{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;text-align:left;}
.il{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.4);}
.inp{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.2);color:#fff;font-family:'Teko',sans-serif;font-size:24px;letter-spacing:4px;padding:12px 18px;border-radius:4px;width:100%;outline:none;transition:border 0.2s;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:rgba(255,255,255,0.2);}
.code-inp{font-size:36px;letter-spacing:14px;text-align:center;text-transform:uppercase;}
.div{display:flex;align-items:center;gap:16px;margin:20px 0;color:rgba(255,255,255,0.2);font-size:13px;letter-spacing:4px;}
.div::before,.div::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1);}
.lerr{color:#ff4444;font-size:14px;letter-spacing:2px;min-height:20px;margin-top:8px;}
/* WAITING */
#waiting{background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a0e04 0%,#08080f 70%);}
.wbox{position:relative;z-index:2;width:min(520px,92vw);text-align:center;}
.wcode{font-family:'Teko',sans-serif;font-size:96px;font-weight:700;letter-spacing:18px;color:#fff;text-shadow:0 0 30px rgba(255,119,0,0.4);line-height:1;}
.wclbl{font-size:11px;letter-spacing:6px;color:rgba(255,255,255,0.3);margin-bottom:6px;}
.whint{font-size:14px;color:rgba(255,255,255,0.4);margin:10px 0 28px;line-height:1.7;}
.whint b{color:rgba(255,255,255,0.8);}
.slots{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
.slot{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:16px;text-align:left;}
.slot.me{border-color:var(--accent);background:rgba(255,119,0,0.07);}
.slot.filled{border-color:rgba(255,255,255,0.22);}
.stm{font-size:10px;letter-spacing:4px;margin-bottom:4px;}
.snm{font-family:'Teko',sans-serif;font-size:26px;font-weight:600;color:#fff;letter-spacing:2px;}
.snm.empty{color:rgba(255,255,255,0.18);}
.wst{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,0.35);margin-bottom:18px;animation:bl 1.2s step-end infinite;}
@keyframes bl{50%{opacity:0.3;}}
.cpbtn{background:rgba(255,119,0,0.12);border:1px solid rgba(255,119,0,0.35);color:var(--accent);font-family:'Teko',sans-serif;font-size:14px;letter-spacing:3px;padding:8px 22px;border-radius:4px;cursor:pointer;margin-bottom:22px;transition:all 0.2s;}
.cpbtn:hover{background:rgba(255,119,0,0.22);}
.cpbtn.ok{color:var(--green);border-color:var(--green);}
/* HUD */
#hud{position:fixed;top:0;left:0;right:0;height:68px;background:var(--hud-bg);border-bottom:1px solid rgba(255,119,0,0.35);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:50;backdrop-filter:blur(12px);}
.ht{display:flex;align-items:center;gap:14px;min-width:180px;}.ht.blue{flex-direction:row-reverse;}
.hbar{width:4px;height:44px;border-radius:2px;}
.hi{display:flex;flex-direction:column;}
.hl{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.4);}
.hs{font-family:'Teko',sans-serif;font-size:46px;line-height:1;font-weight:700;}
.hs.pop{animation:sp 0.3s ease;}
@keyframes sp{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.hc{display:flex;flex-direction:column;align-items:center;gap:2px;}
.htm{font-family:'Teko',sans-serif;font-size:38px;color:#fff;line-height:1;font-weight:500;transition:color 0.3s;}
.htm.warn{color:#ff3333;animation:blink 0.5s step-end infinite;}
@keyframes blink{50%{opacity:0.4}}
.hq{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.35);}
.hp{width:8px;height:8px;border-radius:50%;margin-top:2px;transition:background 0.2s;}
.myrole{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.28);margin-top:1px;}
/* TOAST */
#toast{position:fixed;top:86px;left:50%;transform:translateX(-50%) scale(0.8);font-family:'Teko',sans-serif;font-size:32px;letter-spacing:6px;font-weight:700;padding:10px 40px;background:var(--accent);color:#000;clip-path:polygon(14px 0%,100% 0%,calc(100% - 14px) 100%,0% 100%);opacity:0;transition:all 0.25s;z-index:60;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) scale(1);}
/* GAME OVER */
#gameover{background:radial-gradient(ellipse 70% 50% at 50% 40%,#190c00,#08080f 70%);}
.got{font-family:'Teko',sans-serif;font-size:84px;font-weight:700;letter-spacing:4px;background:linear-gradient(135deg,#ff7700,#ffcc00);-webkit-background-clip:text;background-clip:text;color:transparent;}
.gos{display:flex;gap:80px;justify-content:center;margin:28px 0 40px;align-items:flex-end;}
.goT{text-align:center;}
.goTl{font-size:13px;letter-spacing:5px;color:rgba(255,255,255,0.35);margin-bottom:6px;}
.goTs{font-family:'Teko',sans-serif;font-size:112px;font-weight:700;line-height:1;}
.goT.winner .goTs{color:var(--green);text-shadow:0 0 40px var(--green);}
.goT.loser .goTs{color:rgba(255,255,255,0.15);}
.gob{font-size:12px;letter-spacing:5px;color:var(--green);margin-top:4px;}
.gobtns{display:flex;gap:16px;justify-content:center;}
#ping{position:fixed;bottom:8px;right:12px;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.2);z-index:100;}
</style>
</head>
<body>

<!-- TITLE -->
<div id="title" class="screen active">
  <div class="scanlines"></div>
  <div style="position:relative;z-index:2;text-align:center;">
    <div class="logo-main">HARDWOOD</div>
    <div class="logo-3d">3D</div>
    <div class="logo-sub">ONLINE MULTIPLAYER</div>
    <div class="btns">
      <button class="btn bp" onclick="show('lobby')">▶ PLAY ONLINE</button>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <div class="scanlines"></div>
  <div class="lbox">
    <div class="ltitle">JOIN THE <span>COURT</span></div>
    <div class="lsub">CREATE OR JOIN A ROOM</div>
    <div class="ig"><div class="il">YOUR NAME</div><input class="inp" id="nameInp" maxlength="10" placeholder="PLAYER"/></div>
    <button class="btn bp" style="width:100%" onclick="createRoom()">+ CREATE ROOM</button>
    <div class="div">OR JOIN</div>
    <div class="ig"><div class="il">ROOM CODE</div><input class="inp code-inp" id="codeInp" maxlength="4" placeholder="ABCD" oninput="this.value=this.value.toUpperCase()"/></div>
    <button class="btn bs" style="width:100%" onclick="joinRoom()">JOIN ROOM →</button>
    <div class="lerr" id="lerr"></div>
    <button class="btn bs bsm" style="margin-top:20px" onclick="show('title')">← BACK</button>
  </div>
</div>

<!-- WAITING -->
<div id="waiting" class="screen">
  <div class="scanlines"></div>
  <div class="wbox">
    <div class="wclbl">SHARE THIS CODE WITH FRIENDS</div>
    <div class="wcode" id="wcode">----</div>
    <button class="cpbtn" id="cpbtn" onclick="copyLink()">📋 COPY INVITE LINK</button>
    <div class="whint">Friends go to <b id="siteURL">this site</b> and enter the code above</div>
    <div class="slots" id="slots"></div>
    <div class="wst" id="wst">WAITING FOR PLAYERS...</div>
    <button class="btn bs bsm" onclick="leaveRoom()">← LEAVE</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="hud">
    <div class="ht red">
      <div class="hbar" style="background:var(--p1)"></div>
      <div class="hi"><span class="hl">REDS</span><span class="hs" id="s1" style="color:var(--p1)">0</span></div>
    </div>
    <div class="hc">
      <div class="hp" id="poss" style="background:var(--p1)"></div>
      <div class="htim" id="htim" style="font-family:'Teko',sans-serif;font-size:38px;color:#fff;font-weight:500;line-height:1;">2:00</div>
      <div class="hq" id="hq">QUARTER 1</div>
      <div class="myrole" id="myrole"></div>
    </div>
    <div class="ht blue">
      <div class="hi" style="align-items:flex-end"><span class="hl">BLUES</span><span class="hs" id="s2" style="color:var(--p2)">0</span></div>
      <div class="hbar" style="background:var(--p2)"></div>
    </div>
  </div>
  <div id="toast">NICE!</div>
  <canvas id="c"></canvas>
</div>

<!-- GAME OVER -->
<div id="gameover" class="screen">
  <div class="scanlines"></div>
  <div style="position:relative;z-index:2;text-align:center;">
    <div class="got">FINAL SCORE</div>
    <div class="gos" id="gos"></div>
    <div class="gobtns">
      <button class="btn bp" onclick="show('lobby')">PLAY AGAIN</button>
      <button class="btn bs" onclick="show('title')">MENU</button>
    </div>
  </div>
</div>

<div id="ping">● --ms</div>

<script>
// ══════════════════════════════════════════
//  HARDWOOD 3D — ONLINE CLIENT ENGINE
// ══════════════════════════════════════════
const TAU=Math.PI*2, HUD_H=68, TILE=64;
const CW=28, CD=16, midX=CW/2, midZ=CD/2;
const HOOPS=[{wx:1.8,wy:3.0,wz:midZ,team:1},{wx:CW-1.8,wy:3.0,wz:midZ,team:0}];
const THREE_DIST=7.5, HOOP_R=1.2;
const PCOLS=['#ff3333','#ff8866','#3388ff','#88bbff'];

function iso(wx,wy,wz){return{sx:(wx-wz)*TILE*0.6,sy:(wx+wz)*TILE*0.3-wy*1.1};}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function rand(a,b){return a+Math.random()*(b-a);}

// Canvas
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let offX=0,offY=0;
function resize(){
  canvas.width=window.innerWidth; canvas.height=window.innerHeight-HUD_H;
  canvas.style.marginTop=HUD_H+'px';
  const c=iso(midX,0,midZ); offX=canvas.width/2-c.sx; offY=canvas.height/2-c.sy+40;
}
resize(); window.addEventListener('resize',resize);

// Socket
const socket=io();
let myIdx=-1, myTeam=-1, myName='', roomCode='', isOnline=false;
let remoteState=null, raf=null;
let particles=[], trailPts=[], lastScores=[0,0];

// Ping
let ps=0;
function doPing(){ps=performance.now();socket.emit('ping_');setTimeout(doPing,3000);}
socket.on('connect',doPing);
socket.on('pong_',()=>{document.getElementById('ping').textContent=`● ${Math.round(performance.now()-ps)}ms`;});

// Room events
socket.on('roomCreated',({code,team,playerIdx})=>{
  roomCode=code; myTeam=team; myIdx=playerIdx;
  document.getElementById('wcode').textContent=code;
  document.getElementById('siteURL').textContent=window.location.host||'this site';
  renderSlots([{name:myName,team:0,playerIdx:0}]);
  show('waiting');
});
socket.on('joinedRoom',({code,team,playerIdx})=>{
  roomCode=code; myTeam=team; myIdx=playerIdx;
  document.getElementById('wcode').textContent=code;
  show('waiting');
});
socket.on('playerList',list=>renderSlots(list));
socket.on('error',msg=>{document.getElementById('lerr').textContent=msg;});

socket.on('gameStart',({playerList})=>{
  isOnline=true; lastScores=[0,0]; trailPts=[];
  const me=playerList.find(p=>p.playerIdx===myIdx);
  document.getElementById('myrole').textContent=me?`YOU: ${me.name} · ${me.team===0?'🔴 RED':'🔵 BLUE'}`:'';
  show('game'); startRender(); startInput();
});

socket.on('state',g=>{
  if(!isOnline)return;
  remoteState=g;
  if(g.toast)showToast(g.toast);
  document.getElementById('s1').textContent=g.scores[0];
  document.getElementById('s2').textContent=g.scores[1];
  const m=Math.floor(g.timeLeft/60),s=Math.floor(g.timeLeft%60);
  const tel=document.getElementById('htim');
  tel.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  tel.style.color=g.timeLeft<30?'#ff3333':'#fff';
  document.getElementById('hq').textContent='QUARTER '+g.quarter;
  const carr=g.players.find(p=>p.hasBall);
  if(carr)document.getElementById('poss').style.background=carr.team===0?'var(--p1)':'var(--p2)';
  // Score burst
  if(g.scores[0]!==lastScores[0]){burst(HOOPS[0].wx,2,HOOPS[0].wz,'#ffcc00',18);popScore('s1');lastScores[0]=g.scores[0];}
  if(g.scores[1]!==lastScores[1]){burst(HOOPS[1].wx,2,HOOPS[1].wz,'#ffcc00',18);popScore('s2');lastScores[1]=g.scores[1];}
});

socket.on('gameOver',({scores})=>{isOnline=false;showGO(scores);});
socket.on('playerLeft',()=>showToast('PLAYER LEFT'));

// Lobby fns
function createRoom(){
  myName=(document.getElementById('nameInp').value.trim().toUpperCase()||'PLAYER').slice(0,10);
  document.getElementById('lerr').textContent='';
  socket.emit('createRoom',{name:myName});
}
function joinRoom(){
  const code=document.getElementById('codeInp').value.trim().toUpperCase();
  myName=(document.getElementById('nameInp').value.trim().toUpperCase()||'PLAYER').slice(0,10);
  if(code.length!==4){document.getElementById('lerr').textContent='Enter a 4-letter code';return;}
  document.getElementById('lerr').textContent='';
  socket.emit('joinRoom',{code,name:myName});
}
function leaveRoom(){socket.disconnect();socket.connect();roomCode='';myIdx=-1;myTeam=-1;show('lobby');}
function copyLink(){
  const link=`${window.location.origin}?code=${roomCode}`;
  navigator.clipboard.writeText(link).then(()=>{
    const b=document.getElementById('cpbtn');b.textContent='✓ COPIED!';b.classList.add('ok');
    setTimeout(()=>{b.textContent='📋 COPY INVITE LINK';b.classList.remove('ok');},2000);
  });
}
function renderSlots(list){
  const labels=['P1 — RED','P2 — RED','P3 — BLUE','P4 — BLUE'];
  const tcs=['var(--p1)','var(--p1)','var(--p2)','var(--p2)'];
  let h='';
  for(let i=0;i<4;i++){
    const p=list.find(pl=>pl.playerIdx===i), isMe=i===myIdx;
    h+=`<div class="slot ${isMe?'me':''} ${p?'filled':''}"><div class="stm" style="color:${tcs[i]}">${labels[i]}</div><div class="snm ${p?'':'empty'}">${p?p.name:'WAITING...'}</div></div>`;
  }
  document.getElementById('slots').innerHTML=h;
  const n=4-list.length;
  document.getElementById('wst').textContent=list.length>=2?'STARTING SOON...':list.length===1?`WAITING FOR ${n} MORE PLAYER${n>1?'S':''}...`:'WAITING...';
}

// Input
const keys={};
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())&&e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
let shootDown=false;
function startInput(){
  setInterval(()=>{
    if(!isOnline||!remoteState)return;
    const p=remoteState.players[myIdx]; if(!p)return;
    const sh=!!(keys['f']||keys['l']);
    socket.emit('input',{
      u:!!(keys['w']||keys['arrowup']),d:!!(keys['s']||keys['arrowdown']),
      l:!!(keys['a']||keys['arrowleft']),r:!!(keys['d']||keys['arrowright']),
      pass:!!(keys['g']||keys[';']),
      steal:sh&&!p.hasBall,
      shootStart:!shootDown&&sh&&p.hasBall,
      shootEnd:shootDown&&!sh&&p.hasBall,
    });
    shootDown=sh;
  },33);
}

// Render
function startRender(){
  if(raf)cancelAnimationFrame(raf);
  function loop(){raf=requestAnimationFrame(loop);if(remoteState)draw(remoteState);}
  loop();
}

// Particles
class P{
  constructor(wx,wy,wz,col){this.wx=wx;this.wy=wy;this.wz=wz;this.vx=rand(-0.1,0.1);this.vy=rand(0.05,0.2);this.vz=rand(-0.1,0.1);this.col=col;this.life=1;this.r=rand(3,9);}
  tick(){this.wx+=this.vx;this.wy+=this.vy;this.vy-=0.008;this.wz+=this.vz;if(this.wy<0){this.wy=0;this.vy*=-0.3;}this.life-=0.025;this.r*=0.97;}
}
function burst(wx,wy,wz,col,n){for(let i=0;i<n;i++)particles.push(new P(wx,wy,wz,col));}
function popScore(id){const el=document.getElementById(id);el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}

function draw(g){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0a0a16');bg.addColorStop(1,'#050508');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Crowd
  for(let r=0;r<3;r++)for(let x=0;x<W;x+=18){ctx.fillStyle=`hsla(${rand(0,360)},60%,60%,${rand(0.04,0.14)})`;ctx.beginPath();ctx.arc(x+rand(-3,3),H*0.02+r*14+rand(-2,2),rand(3,6),0,TAU);ctx.fill();}
  ctx.save();ctx.translate(offX,offY);
  drawCourt();
  for(const p of g.players)drawShadow(p.wx,p.wy||0+(p.jumpH||0),p.wz,22,8,Math.max(0,0.35-(p.jumpH||0)*0.05));
  drawBallShadow(g.ball);
  drawTrail(g.ball);
  // Z-sort
  const objs=[...g.players.map(p=>({t:'p',o:p,d:p.wx+p.wz})),{t:'b',o:g.ball,d:g.ball.wx+g.ball.wz+0.5}];
  objs.sort((a,b)=>a.d-b.d);
  for(const o of objs)o.t==='p'?drawPlayer(o.o):drawBall(o.o);
  // Particles
  particles=particles.filter(p=>{p.tick();return p.life>0&&p.r>0.5;});
  ctx.globalAlpha=1;
  for(const p of particles){const i2=iso(p.wx,p.wy,p.wz);ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(i2.sx,i2.sy,p.r,0,TAU);ctx.fill();}
  ctx.globalAlpha=1;
  if(g.flashT>0){ctx.fillStyle=`rgba(255,200,0,${g.flashT*0.12})`;ctx.fillRect(-W,-H,W*3,H*3);}
  ctx.restore();
}

function drawCourt(){
  const c=[iso(0,0,0),iso(CW,0,0),iso(CW,0,CD),iso(0,0,CD)];
  ctx.beginPath();c.forEach((p,i)=>i===0?ctx.moveTo(p.sx,p.sy):ctx.lineTo(p.sx,p.sy));ctx.closePath();
  const cg=ctx.createLinearGradient(c[0].sx,c[0].sy,c[2].sx,c[2].sy);
  cg.addColorStop(0,'#b87020');cg.addColorStop(0.5,'#c88030');cg.addColorStop(1,'#a06018');
  ctx.fillStyle=cg;ctx.fill();
  for(let z=0;z<=CD;z+=0.6){const p1=iso(0,0,z),p2=iso(CW,0,z);ctx.beginPath();ctx.moveTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=1;ctx.stroke();}
  for(let x=0;x<=CW;x+=3){const p1=iso(x,0,0),p2=iso(x,0,CD);ctx.beginPath();ctx.moveTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.strokeStyle='rgba(0,0,0,0.05)';ctx.lineWidth=1;ctx.stroke();}
  const sh=ctx.createLinearGradient(c[0].sx,c[0].sy,c[3].sx,c[3].sy);
  sh.addColorStop(0,'rgba(255,255,255,0.1)');sh.addColorStop(1,'rgba(0,0,0,0.05)');
  ctx.fillStyle=sh;ctx.beginPath();c.forEach((p,i)=>i===0?ctx.moveTo(p.sx,p.sy):ctx.lineTo(p.sx,p.sy));ctx.closePath();ctx.fill();
  drawLines(); for(const h of HOOPS)drawHoop(h);
}
function il(x1,z1,x2,z2,col,lw){const p1=iso(x1,0.01,z1),p2=iso(x2,0.01,z2);ctx.beginPath();ctx.moveTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();}
function ie(cx,cz,rx,rz,col,lw){ctx.beginPath();for(let i=0;i<=32;i++){const a=(i/32)*TAU,p=iso(cx+Math.cos(a)*rx,0.01,cz+Math.sin(a)*rz);i===0?ctx.moveTo(p.sx,p.sy):ctx.lineTo(p.sx,p.sy);}ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();}
function drawLines(){
  const lc='rgba(255,255,255,0.25)',lw=1.5;
  il(0,0,CW,0,lc,lw);il(CW,0,CW,CD,lc,lw);il(CW,CD,0,CD,lc,lw);il(0,CD,0,0,lc,lw);
  il(midX,0,midX,CD,lc,lw);ie(midX,midZ,3,2.5,lc,lw);ie(midX,midZ,0.25,0.15,'rgba(255,255,255,0.3)',2);
  il(0,midZ-2.5,5,midZ-2.5,lc,lw);il(5,midZ-2.5,5,midZ+2.5,lc,lw);il(5,midZ+2.5,0,midZ+2.5,lc,lw);
  il(CW,midZ-2.5,CW-5,midZ-2.5,lc,lw);il(CW-5,midZ-2.5,CW-5,midZ+2.5,lc,lw);il(CW-5,midZ+2.5,CW,midZ+2.5,lc,lw);
  ie(5,midZ,2,1.5,'rgba(255,255,255,0.2)',lw);ie(CW-5,midZ,2,1.5,'rgba(255,255,255,0.2)',lw);
  for(const h of HOOPS){ctx.beginPath();let f=true;for(let i=0;i<=24;i++){const a=-Math.PI/2+(i/24)*Math.PI,x=h.wx+Math.cos(a)*THREE_DIST,z=h.wz+Math.sin(a)*THREE_DIST;if(x<0||x>CW)continue;const p=iso(x,0.01,z);if(f){ctx.moveTo(p.sx,p.sy);f=false;}else ctx.lineTo(p.sx,p.sy);}ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=lw;ctx.stroke();}
}
function drawHoop(h){
  const base=iso(h.wx,0,h.wz),top=iso(h.wx,h.wy,h.wz);
  ctx.beginPath();ctx.moveTo(base.sx,base.sy);ctx.lineTo(top.sx,top.sy);ctx.strokeStyle='#888';ctx.lineWidth=3;ctx.stroke();
  const s=h.wx<CW/2?-0.6:0.6;
  const bt=iso(h.wx+s,h.wy+0.9,h.wz),bb=iso(h.wx+s,h.wy-0.6,h.wz);
  ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(bb.sx,bb.sy);ctx.lineTo(bt.sx,bt.sy);ctx.stroke();
  ctx.strokeStyle='#e84400';ctx.lineWidth=3.5;ctx.beginPath();
  for(let i=0;i<=20;i++){const a=(i/20)*TAU,p=iso(h.wx+Math.cos(a)*HOOP_R*0.7,h.wy,h.wz+Math.sin(a)*HOOP_R*0.45);i===0?ctx.moveTo(p.sx,p.sy):ctx.lineTo(p.sx,p.sy);}ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.2;
  for(let i=0;i<10;i++){const a=(i/10)*TAU,rp=iso(h.wx+Math.cos(a)*HOOP_R*0.65,h.wy,h.wz+Math.sin(a)*HOOP_R*0.4),np=iso(h.wx+Math.cos(a)*0.3,h.wy-1.0,h.wz+Math.sin(a)*0.2);ctx.beginPath();ctx.moveTo(rp.sx,rp.sy);ctx.lineTo(np.sx,np.sy);ctx.stroke();}
}
function drawShadow(wx,wy,wz,rx,ry,al){const g=iso(wx,0,wz);const sc=Math.max(0.2,1-wy/5);ctx.fillStyle=`rgba(0,0,0,${al})`;ctx.beginPath();ctx.ellipse(g.sx,g.sy+4,rx*sc,ry*sc,0,0,TAU);ctx.fill();}
function drawBallShadow(b){const g=iso(b.wx,0,b.wz);const sc=Math.max(0.1,1-b.wy/8);const al=Math.max(0,0.4-b.wy*0.04);ctx.fillStyle=`rgba(0,0,0,${al})`;ctx.beginPath();ctx.ellipse(g.sx,g.sy+3,18*sc,6*sc,0,0,TAU);ctx.fill();}
function drawTrail(b){
  if(!b.inFlight){trailPts=[];return;}
  trailPts.push({wx:b.wx,wy:b.wy,wz:b.wz});if(trailPts.length>14)trailPts.shift();
  for(let i=0;i<trailPts.length;i++){const t=trailPts[i],p=iso(t.wx,t.wy,t.wz);ctx.globalAlpha=(i/trailPts.length)*0.35;ctx.fillStyle='#ff7700';ctx.beginPath();ctx.arc(p.sx,p.sy,4*(i/trailPts.length),0,TAU);ctx.fill();}
  ctx.globalAlpha=1;
}
function drawPlayer(p){
  const i2=iso(p.wx,(p.wy||0)+(p.jumpH||0),p.wz);const bob=p.celebrating>0?Math.sin(Date.now()*0.008)*5:0;
  const col=PCOLS[p.id]||'#fff';const isMe=p.id===myIdx;
  ctx.save();ctx.translate(i2.sx,i2.sy+bob);
  ctx.fillStyle=col+'99';ctx.fillRect(-5.5,-4,5,12);ctx.fillRect(0.5,-4,5,12);
  const jg=ctx.createRadialGradient(-5,-12,2,0,-8,16);jg.addColorStop(0,'#fff');jg.addColorStop(0.3,col);jg.addColorStop(1,col+'bb');
  ctx.fillStyle=jg;ctx.beginPath();ctx.roundRect(-16,-22,32,22,6);ctx.fill();
  if(isMe){ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.beginPath();ctx.roundRect(-18,-24,36,26,7);ctx.stroke();ctx.setLineDash([]);}
  const hg=ctx.createRadialGradient(-4,-32,2,0,-28,11);hg.addColorStop(0,'#ffe4c4');hg.addColorStop(1,'#c8966e');
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(0,-30,11,0,TAU);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc((p.facing||1)*4,-30,2,0,TAU);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 10px Rajdhani';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('P'+(p.id+1),0,-11);
  if(p.shooting){const ch=clamp((p.shootT||0)/0.55,0,1);ctx.strokeStyle=ch>0.65?'#00ffaa':ch>0.38?'#ffcc00':'#ff3333';ctx.lineWidth=3.5;ctx.setLineDash([]);ctx.beginPath();ctx.arc(0,-8,22,-Math.PI/2,-Math.PI/2+ch*TAU);ctx.stroke();}
  if(p.celebrating>0){for(let i=0;i<5;i++){const a=(i/5)*TAU+p.celebrating*5,cr=22+Math.sin(p.celebrating*8+i)*6;ctx.fillStyle=`hsla(${40+i*30},100%,70%,${p.celebrating*0.8})`;ctx.beginPath();ctx.arc(Math.cos(a)*cr,Math.sin(a)*cr-14,3,0,TAU);ctx.fill();}}
  ctx.restore();
}
function drawBall(b){
  const i2=iso(b.wx,b.wy,b.wz);const R=10;
  ctx.save();ctx.translate(i2.sx,i2.sy);ctx.rotate((b.spin||0)*0.15);
  if(b.inFlight){ctx.shadowColor='#ff7700';ctx.shadowBlur=20;}
  const bg=ctx.createRadialGradient(-R*0.4,-R*0.4,1,0,0,R);bg.addColorStop(0,'#ffb347');bg.addColorStop(0.5,'#e8621a');bg.addColorStop(1,'#b84000');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,R,0,TAU);ctx.fill();ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-R,0);ctx.quadraticCurveTo(0,-R*0.6,R,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-R,0);ctx.quadraticCurveTo(0,R*0.6,R,0);ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,R,0,TAU);ctx.stroke();
  ctx.restore();
}

let ttimer;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(ttimer);ttimer=setTimeout(()=>el.classList.remove('show'),1500);}
function showGO(scores){
  const w=scores[0]>scores[1]?0:scores[0]<scores[1]?1:-1;
  document.getElementById('gos').innerHTML=`
    <div class="goT ${w===0?'winner':'loser'}"><div class="goTl">RED SQUAD</div><div class="goTs" style="color:${w===0?'var(--green)':'rgba(255,80,80,0.2)'}">${scores[0]}</div>${w===0?'<div class="gob">🏆 WINNERS</div>':''}</div>
    <div style="font-family:'Teko',sans-serif;font-size:36px;color:rgba(255,255,255,0.15);align-self:center">VS</div>
    <div class="goT ${w===1?'winner':'loser'}"><div class="goTl">BLUE SQUAD</div><div class="goTs" style="color:${w===1?'var(--green)':'rgba(68,136,255,0.2)'}">${scores[1]}</div>${w===1?'<div class="gob">🏆 WINNERS</div>':''}</div>`;
  show('gameover');
}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// Auto-fill code from invite link
const urlCode=new URLSearchParams(window.location.search).get('code');
if(urlCode){document.getElementById('codeInp').value=urlCode.toUpperCase();show('lobby');}
</script>
